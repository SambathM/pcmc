@if (isCheckingAuth) {
  <div class="fixed inset-0 z-50 bg-slate-950 flex align-items-center justify-content-center">
    <div class="flex flex-column align-items-center gap-3 text-slate-400">
      <div
        class="h-8 w-8 rounded-full border-2 border-emerald-500 border-t-transparent animate-spin"
      ></div>
      <span class="text-xs font-mono uppercase tracking-widest">Authenticating…</span>
    </div>
  </div>
}
<!-- Pre-emptive sticky banner: no internet / reconnecting (before any request fails) -->
<app-connection-banner />

<router-outlet />

<!-- Global connection / server error dialog (persistent until dismissed or retried) -->
<p-dialog
  [visible]="serverError !== null"
  [modal]="true"
  [closable]="false"
  [draggable]="false"
  [resizable]="false"
  [closeOnEscape]="false"
  [dismissableMask]="false"
  [header]="serverError?.title ?? ''"
  [style]="{ width: '26rem' }"
>
  <div class="flex align-items-start gap-3">
    <i class="pi {{ serverError?.icon }}" style="font-size: 1.5rem; color: var(--p-rose-400, #fb7185)"></i>
    <p class="m-0" style="line-height: 1.5">{{ serverError?.message }}</p>
  </div>

  <ng-template pTemplate="footer">
    <p-button label="Dismiss" severity="secondary" [text]="true" (onClick)="dismissError()" />
    <p-button label="Retry" icon="pi pi-refresh" (onClick)="retry()" />
  </ng-template>
</p-dialog>
